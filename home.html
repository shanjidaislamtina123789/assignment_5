<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GitHub Issues Tracker</title>
<link rel="stylesheet" href="home.css">
</head>

<body>

<nav class="navbar">

<div class="brand">
<img src="./assets/github-logo.png">
<h1>GitHub Issues Tracker</h1>
</div>

<div class="nav-actions">
<input id="searchInput" type="text" placeholder="Search issues...">
<button class="new-issue">+ New Issue</button>
</div>

</nav>



<div class="tabs">

<button class="tab active" onclick="changeTab(event,'all')">All</button>
<button class="tab" onclick="changeTab(event,'open')">Open</button>
<button class="tab" onclick="changeTab(event,'closed')">Closed</button>

</div>


<div class="issue-header">

    <div class="issue-info">
      <img src="./assets/Aperture.png" alt="Project Icon">
      <div class="issue-text">
        <span><b><span id="issueCount">0</span> Issues</b></span>
        <p>Track and manage your project issues</p>
      </div>
    </div>
  
    <div class="marker">
      <span class="green-dot"></span> Open
      <span class="purple-dot"></span> Closed
    </div>
  
  </div>



<div id="loader" class="loader hidden"></div>



<div id="issueContainer" class="grid"></div>



<div id="modal" class="modal">
  <div class="modal-content">
    <div class="modal-header">
      <h2 id="modalTitle">Fix broken image uploads</h2>
      <div class="modal-meta">
        <span id="modalStatusBadge" class="status-badge">Opened</span>
        <span class="meta-text">Opened by <b id="modalAuthor">Fahim Ahmed</b> • <span id="modalDate">22/02/2026</span></span>
      </div>
    </div>

    <div id="modalTagSection" class="tag-section">
      </div>

    <p id="modalDescription" class="modal-desc"></p>

    <div class="modal-info-grid">
      <div class="info-item">
        <label>Assignee:</label>
        <span id="modalAssignee"></span>
      </div>
      <div class="info-item">
        <label>Priority:</label>
        <span id="modalPriorityBadge" class="priority-badge">HIGH</span>
      </div>
    </div>

    <div class="modal-footer">
      <button class="close-btn" onclick="closeModal()">Close</button>
    </div>
  </div>
</div>


<script src="script.js"></script>

</body>
</html>
