<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GitHub Issues Tracker - Login</title>
  <link rel="stylesheet" href="style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
<script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body>
  <div class="login-container">
    <img src="./assets/github-logo.png">
    <h1>GitHub Issues Tracker</h1>
    <p>Sign in to manage your issues</p>
    
    <form id="loginForm">
        <label for="username">Username</label>
        <input type="text" id="username"placeholder="Enter Username">
 
        
        <label for="password">Password</label>
        <input type="password" id="password" placeholder="Enter Password">
      
        <button type="submit">Sign In</button>
      </form>

  </div>
  <script src="login.js"></script>
</body>
</html>
